<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PetStory | Lovable Pet Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #FFF9F2; /* Warm Cream */
            color: #4A3728; /* Soft Chocolate Brown */
            font-family: 'Fredoka', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .soft-shadow { shadow-lg shadow-orange-200/50; }
        .bottom-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border-top: 2px solid #F3E5D8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-50 bg-[#FFF9F2]/80 backdrop-blur-md px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-[#FF8B8B] tracking-tight">petstory</h1>
        <a href="auth.html" class="bg-[#FFB347] text-white px-5 py-2 rounded-full text-sm font-bold shadow-md active:scale-95 transition-all">
            Join
        </a>
    </nav>

    <main id="mainContent" class="max-w-md mx-auto px-4 mt-4 space-y-6">
        
        <div id="petFeed" class="space-y-6">
            <p class="text-center text-[#4A3728]/30 py-20 italic">Sniffing out some pets...</p>
        </div>

    </main>

    <nav class="fixed bottom-0 inset-x-0 z-50 bottom-nav px-8 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button onclick="window.scrollTo(0,0)" class="flex flex-col items-center gap-1 text-[#FF8B8B]">
                <span class="text-2xl">🏠</span>
                <span class="text-[10px] font-bold uppercase">Feed</span>
            </button>

            <button onclick="showUploadModal()" class="bg-[#FF8B8B] w-14 h-14 rounded-full flex items-center justify-center text-white shadow-lg shadow-red-200 -mt-10 border-4 border-[#FFF9F2] active:scale-90 transition-all">
                <span class="text-3xl">+</span>
            </button>

            <button onclick="alert('Hall of Fame coming soon!')" class="flex flex-col items-center gap-1 text-[#4A3728]/40">
                <span class="text-2xl">🏆</span>
                <span class="text-[10px] font-bold uppercase">Fame</span>
            </button>
        </div>
    </nav>

    <script>
        async function loadFeed() {
            const res = await fetch('/api/feed');
            const pets = await res.json();
            const feed = document.getElementById('petFeed');
            
            if(pets.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 text-[#4A3728]/40">No pets yet. Click + to be the first!</div>';
                return;
            }

            feed.innerHTML = pets.map(p => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-[#F3E5D8]">
                    <div class="p-5 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#FFB347]/20 flex items-center justify-center text-xl">
                            ${p.pet_type === 'dog' ? '🐶' : '🐱'}
                        </div>
                        <div>
                            <h4 class="font-bold text-lg leading-none">${p.name}</h4>
                            <p class="text-[10px] text-[#4A3728]/40 uppercase font-bold">${p.pet_type}</p>
                        </div>
                    </div>

                    <div class="aspect-square bg-[#FDF1E6] flex items-center justify-center text-4xl opacity-50">
                         ${p.pet_type === 'dog' ? '🦴' : '🐟'}
                    </div>

                    <div class="p-6 flex justify-between items-center">
                        <div class="flex gap-6">
                            <button onclick="votePet('${p.id}')" class="flex items-center gap-2 group">
                                <span class="text-2xl group-active:scale-125 transition-all text-[#FF8B8B]">❤️</span>
                                <span class="font-bold text-sm">${p.bones || 0}</span>
                            </button>
                            <button onclick="alert('Comments coming soon!')" class="text-2xl">💬</button>
                            <button onclick="alert('Share link copied!')" class="text-2xl">🔗</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function votePet(petId) {
            const res = await fetch('/api/vote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ petId })
            });
            if (res.ok) { loadFeed(); }
        }

        function showUploadModal() {
            // We'll build the dedicated "Beam Up" page next!
            window.location.href = '#'; 
            alert("Ready to build the post page?");
        }

        loadFeed();
    </script>
</body>
</html>
