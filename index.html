<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStory | Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f14; color: white; }
        .glass { background: rgba(22, 22, 29, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <header class="w-full max-w-md py-6 flex justify-between items-center">
        <h1 class="text-xl font-black italic text-indigo-500 uppercase">PetStory</h1>
        <span class="text-[10px] bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-full border border-indigo-500/20 font-bold">12H FEED</span>
    </header>

    <main class="w-full max-w-md space-y-8">
        <section class="glass p-6 rounded-[2rem] space-y-4">
            <input id="petName" type="text" placeholder="Pet Name..." class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 focus:outline-none focus:border-indigo-500">
            <select id="petType" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4">
                <option value="dog">Dog (Bone 🦴)</option>
                <option value="cat">Cat (Fish 🐟)</option>
                <option value="bird">Bird (Seed 🌻)</option>
            </select>
            <button onclick="submitPet()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black tracking-widest active:scale-95 transition">BEAM UP 🚀</button>
        </section>

        <section>
            <h2 class="text-xs font-bold text-white/30 uppercase tracking-[0.2em] mb-6">Live Rankings</h2>
            <div id="petFeed" class="space-y-4">
                <p class="text-center text-white/10 animate-pulse">Scanning the Edge...</p>
            </div>
        </section>
    </main>

    <script>
        async function submitPet() {
            const name = document.getElementById('petName').value;
            const type = document.getElementById('petType').value;
            if(!name) return alert("Name required");

            const res = await fetch('/api/submit', {
                method: 'POST',
                body: JSON.stringify({ name, pet_type: type })
            });

            if(res.ok) { loadFeed(); document.getElementById('petName').value = ""; }
        }

        async function loadFeed() {
            const res = await fetch('/api/feed');
            const pets = await res.json();
            const feed = document.getElementById('petFeed');
            
            if(pets.length === 0) {
                feed.innerHTML = '<p class="text-center text-white/20 py-10">No pets beamed up yet. Be the first!</p>';
                return;
            }

            feed.innerHTML = pets.map(p => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center border border-white/5">
                    <div>
                        <h3 class="font-bold text-lg">${p.name}</h3>
                        <p class="text-[10px] text-white/40 uppercase tracking-widest">${p.pet_type}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-mono text-indigo-400">${p.bones || 0}</span>
                        <button class="bg-white/5 p-3 rounded-2xl border border-white/10 hover:bg-white/10 transition">
                            ${p.pet_type === 'dog' ? '🦴' : p.pet_type === 'cat' ? '🐟' : '🌻'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        loadFeed(); // Initial load
        setInterval(loadFeed, 10000); // Auto-refresh every 10 seconds
        async function votePet(petId) {
    // This sends the vote to the Cloudflare Function
    const res = await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ petId: petId })
    });

    if (res.ok) {
        // Refresh the feed immediately to show the new score
        loadFeed();
    }
}
    </script>
</body>
</html>
