<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join PetStory | Become a Celebrity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #FFF9F2; /* Warm Cream */
            color: #4A3728; /* Soft Chocolate Brown */
            font-family: 'Fredoka', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .auth-card { background: white; border: 2px solid #F3E5D8; shadow-xl shadow-orange-100/50; }
        .input-field { background-color: #FDF1E6; border: 2px solid transparent; transition: all 0.3s; }
        .input-field:focus { border-color: #FFB347; outline: none; background-color: white; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm auth-card p-8 rounded-[3rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#FF8B8B] mb-2">petstory</h1>
            <p class="text-[10px] text-[#4A3728]/40 font-bold uppercase tracking-[0.2em]">Member Portal</p>
        </div>

        <div id="authBox" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold uppercase ml-4 mb-1 block text-[#4A3728]/40">Gmail Address</label>
                <input id="email" type="email" placeholder="hello@gmail.com" 
                    class="w-full input-field rounded-2xl p-4 text-sm font-medium">
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase ml-4 mb-1 block text-[#4A3728]/40">Username</label>
                <input id="username" type="text" placeholder="PetLover123" 
                    class="w-full input-field rounded-2xl p-4 text-sm font-medium">
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase ml-4 mb-1 block text-[#4A3728]/40">Password</label>
                <input id="password" type="password" placeholder="••••••••" 
                    class="w-full input-field rounded-2xl p-4 text-sm font-medium">
            </div>
            
            <button onclick="handleSignup()" 
                class="w-full bg-[#FF8B8B] text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-red-100 hover:bg-[#ff7a7a] active:scale-95 transition-all mt-4">
                CREATE ACCOUNT
            </button>
            
            <p class="text-center text-[11px] text-[#4A3728]/40 mt-6">
                Already have an account? 
                <a href="#" class="text-[#FFB347] font-bold hover:underline">Login here</a>
            </p>
        </div>
        
        <div class="flex justify-center gap-2 mt-8 opacity-20 text-xl">
            <span>🐾</span><span>🦴</span><span>🐾</span>
        </div>
    </div>

    <script>
        async function handleSignup() {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if(!email || !username || !password) {
                return alert("Oops! Please fill in all fields 🐾");
            }

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password })
            });

            if (res.ok) {
                alert("Wagging tails! 🐾 Check your Gmail to verify your account.");
            } else {
                const err = await res.json();
                alert(err.error || "Something went wrong. Try again!");
            }
        }
    </script>
</body>
</html>
