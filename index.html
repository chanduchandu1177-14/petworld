<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStory | Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f14] text-white p-6">
    <h1 class="text-xl font-black italic text-indigo-500 mb-10">PETSTORY</h1>

    <div class="max-w-md mx-auto bg-white/5 p-6 rounded-3xl border border-white/10 mb-12">
        <input id="petName" type="text" placeholder="Pet Name..." class="w-full bg-black p-4 rounded-xl mb-4 text-white">
        <select id="petType" class="w-full bg-black p-4 rounded-xl mb-4 text-white/50">
            <option value="dog">Dog (Bone 🦴)</option>
            <option value="cat">Cat (Fish 🐟)</option>
        </select>
        <button onclick="submitPet()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">BEAM UP 🚀</button>
    </div>

    <div class="max-w-md mx-auto">
        <h2 class="text-sm font-bold text-white/40 mb-6 uppercase tracking-widest">Live Feed</h2>
        <div id="feed" class="space-y-6">
            <p class="text-center text-white/20 italic">Loading pets...</p>
        </div>
    </div>

    <script>
        // Logic to Save a Pet
        async function submitPet() {
            const name = document.getElementById('petName').value;
            const type = document.getElementById('petType').value;
            const response = await fetch('/api/submit', {
                method: 'POST',
                body: JSON.stringify({ name, pet_type: type })
            });
            if (response.ok) { alert("Success!"); loadFeed(); } 
            else { alert("Error: Check D1 bindings in Cloudflare Settings"); }
        }

        // Logic to Load and Show Pets
        async function loadFeed() {
            const res = await fetch('/api/feed');
            const pets = await res.json();
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = pets.map(p => `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${p.name}</p>
                        <p class="text-xs text-white/40 uppercase">${p.pet_type}</p>
                    </div>
                    <div class="text-xl">${p.pet_type === 'dog' ? '🦴' : '🐟'}</div>
                </div>
            `).join('');
        }
        loadFeed(); // Run this when the page opens
    </script>
</body>
</html>
