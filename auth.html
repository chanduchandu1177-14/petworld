<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DogSocial — Login / Signup</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fdf6f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 10px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #e55a2b;
}

.switch {
  text-align: center;
  margin-top: 15px;
  cursor: pointer;
  color: #ff6b35;
}

.error {
  color: red;
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="form-title">Login</h2>

  <div class="error" id="error-msg"></div>

  <input type="text" id="username" placeholder="Username (Signup only)" style="display:none" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button id="submit-btn">Login</button>

  <div class="switch" id="switch-btn">
    Don't have an account? Signup
  </div>
</div>

<script>
const API_BASE = "https://petsocial-api.chanduchandu1177.workers.dev";
const TOKEN_KEY = "dogsocial_token";
const USER_KEY  = "dogsocial_user";

let isLogin = true;

const title = document.getElementById("form-title");
const usernameInput = document.getElementById("username");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const submitBtn = document.getElementById("submit-btn");
const switchBtn = document.getElementById("switch-btn");
const errorMsg = document.getElementById("error-msg");

/* If already logged in → redirect */
if (localStorage.getItem(TOKEN_KEY)) {
  window.location.replace("/");
}

/* Switch Login / Signup */
switchBtn.addEventListener("click", () => {
  isLogin = !isLogin;
  errorMsg.textContent = "";

  if (isLogin) {
    title.textContent = "Login";
    usernameInput.style.display = "none";
    submitBtn.textContent = "Login";
    switchBtn.textContent = "Don't have an account? Signup";
  } else {
    title.textContent = "Signup";
    usernameInput.style.display = "block";
    submitBtn.textContent = "Create Account";
    switchBtn.textContent = "Already have an account? Login";
  }
});

/* Submit */
submitBtn.addEventListener("click", async () => {
  errorMsg.textContent = "";

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  const username = usernameInput.value.trim();

  if (!email || !password || (!isLogin && !username)) {
    errorMsg.textContent = "Please fill all fields.";
    return;
  }

  const endpoint = isLogin ? "/login" : "/signup";

  try {
    const res = await fetch(API_BASE + endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(
        isLogin
          ? { email, password }
          : { username, email, password }
      )
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Something went wrong");
    }

    /* Save token */
    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(USER_KEY, JSON.stringify(data.user));

    /* Redirect to home */
    window.location.replace("/");

  } catch (err) {
    errorMsg.textContent = err.message;
  }
});
</script>

</body>
</html>
